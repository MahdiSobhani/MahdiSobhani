<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420">

<defs>

<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#050505"/>
<stop offset="50%" stop-color="#0d0d0d"/>
<stop offset="100%" stop-color="#050505"/>
</linearGradient>

<linearGradient id="gold">
<stop offset="0%" stop-color="#6d4c00"/>
<stop offset="20%" stop-color="#b8860b"/>
<stop offset="50%" stop-color="#ffe27a"/>
<stop offset="80%" stop-color="#d4af37"/>
<stop offset="100%" stop-color="#7a5600"/>
</linearGradient>

<linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="white" stop-opacity="0"/>
<stop offset="48%" stop-color="white" stop-opacity="0"/>
<stop offset="50%" stop-color="white" stop-opacity="1"/>
<stop offset="52%" stop-color="white" stop-opacity="0"/>
<stop offset="100%" stop-color="white" stop-opacity="0"/>
</linearGradient>

<filter id="glow">
<feGaussianBlur stdDeviation="6" result="blur"/>
<feMerge>
<feMergeNode in="blur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>

<mask id="mask">
<rect width="1600" height="420" fill="black"/>

<rect x="-350"
      y="0"
      width="220"
      height="420"
      fill="url(#shine)"
      transform="rotate(-18 0 0)">

<animate attributeName="x"
from="-350"
to="1900"
dur="4s"
repeatCount="indefinite"/>

</rect>

</mask>

</defs>

<rect width="1600" height="420" fill="url(#bg)"/>

<!-- Background lines -->

<g opacity=".07" stroke="#d4af37" stroke-width="2">

<line x1="0" y1="90" x2="1600" y2="90"/>
<line x1="0" y1="330" x2="1600" y2="330"/>

</g>

<!-- Particles -->

<g fill="#ffd54a">

<circle cx="160" cy="80" r="2">
<animate attributeName="opacity"
values=".2;1;.2"
dur="2.5s"
repeatCount="indefinite"/>
</circle>

<circle cx="400" cy="320" r="2">
<animate attributeName="opacity"
values="1;.3;1"
dur="3.7s"
repeatCount="indefinite"/>
</circle>

<circle cx="720" cy="120" r="2">
<animate attributeName="opacity"
values=".2;1;.2"
dur="4.3s"
repeatCount="indefinite"/>
</circle>

<circle cx="980" cy="290" r="2">
<animate attributeName="opacity"
values=".3;1;.3"
dur="2.9s"
repeatCount="indefinite"/>
</circle>

<circle cx="1240" cy="140" r="2">
<animate attributeName="opacity"
values="1;.2;1"
dur="3.1s"
repeatCount="indefinite"/>
</circle>

<circle cx="1450" cy="260" r="2">
<animate attributeName="opacity"
values=".3;1;.3"
dur="4.6s"
repeatCount="indefinite"/>
</circle>

</g>

<!-- Main Text -->

<text
x="800"
y="220"
text-anchor="left"
font-family="Segoe UI,Arial,sans-serif"
font-size="50"
font-weight="800"
letter-spacing="8"
fill="url(#gold)"
filter="url(#glow)">
More Adventure
More Advantage
</text>

<!-- Shine -->

<text
x="800"
y="220"
text-anchor="left"
font-family="Segoe UI,Arial,sans-serif"
font-size="50"
font-weight="800"
letter-spacing="8"
fill="white"
mask="url(#mask)"
opacity=".9">

👀 More Adventure

👀 More Advantage

</text>

</svg>
